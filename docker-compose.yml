version: "3.9"

services:
  firebird:
    image: firebirdsql/firebird:5.0.2
    environment:
      - ISC_PASSWORD=3122414422
    volumes:
      - firebird_data:/firebird/data   
    networks:
      - traefik
    deploy:
      placement:
        constraints: ["${NODE}"]  
    ports:
      - "3051:3050"    
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL}  

  sftp:
    image: atmoz/sftp
    user: "0:0"
    volumes:
      - firebird_data:/home/sftp-user/firebird-data  
    ports:
      - "2223:22"
    command: >
    sh -lc "
      chown -R 1001:1001 /home/sftp-user/firebird-data || true;
      chmod -R u+rwX,g+rwX /home/sftp-user/firebird-data || true;
      /entrypoint sftp-user:admin:1001:1001:firebird-data
    "
    deploy:
      placement:
        constraints: ["${NODE}"]      
    restart: unless-stopped
    
volumes:
  firebird_data:
    driver: local
    name: "${SERVICE_NAME}_firebird_data"
networks:
  traefik:
    external:
      name: traefik-network
